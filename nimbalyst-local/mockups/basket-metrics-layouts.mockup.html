<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Basket Metrics — CY vs LY layout options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f4f6f9; --panel:#fff; --ink:#1b2430; --text:#2c3742; --muted:#5c6a7a; --faint:#8a96a6;
  --line:#e4e9f0; --line-strong:#cfd7e2; --blue:#2f6bd6; --blue-soft:#e9f0fb;
  --pos:#2f8a56; --posSoft:#e7f2ea; --neg:#b0554f; --negSoft:#f6e8e6;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Inter,system-ui,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1200px;margin:0 auto;padding:26px 22px 70px;}
h1{font-size:1.2rem;margin:0 0 3px;color:var(--ink);letter-spacing:-.01em;}
.sub{color:var(--faint);font-size:.82rem;margin:0 0 18px;}

/* layout switcher */
.switch{display:inline-flex;flex-wrap:wrap;gap:6px;border:1px solid var(--line-strong);border-radius:10px;padding:4px;background:var(--panel);margin-bottom:6px;}
.switch button{border:0;background:transparent;color:var(--muted);font-size:.78rem;font-weight:700;padding:7px 13px;border-radius:7px;cursor:pointer;}
.switch button:hover{color:var(--ink);}
.switch button.active{background:var(--ink);color:#fff;}
.optnote{font-size:.72rem;color:var(--faint);margin:8px 2px 18px;min-height:1em;}

/* metric card grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px rgba(20,30,50,.04);}
.card-h{display:flex;align-items:center;gap:8px;padding:11px 15px;border-bottom:1px solid var(--line);background:#fbfcfe;}
.card-h .dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.card-h .t{font-size:.82rem;font-weight:700;color:var(--ink);}
.card-b{padding:6px 15px 12px;}

/* delta chip (shared) */
.chip{display:inline-flex;align-items:center;gap:3px;font-size:.68rem;font-weight:700;font-variant-numeric:tabular-nums;padding:2px 7px;border-radius:999px;white-space:nowrap;}
.chip.pos{color:var(--pos);background:var(--posSoft);}
.chip.neg{color:var(--neg);background:var(--negSoft);}
.pctxt.pos{color:var(--pos);} .pctxt.neg{color:var(--neg);}

/* ============ OPT A — side-by-side CY | LY columns ============ */
.a-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid #eef1f6;}
.a-row:last-child{border-bottom:0;}
.a-lab{font-size:.72rem;color:var(--muted);font-weight:600;line-height:1.3;}
.a-cmp{display:flex;align-items:flex-end;gap:14px;}
.a-col{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1;}
.a-col .k{font-size:.54rem;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:700;margin-bottom:2px;}
.a-col .v{font-size:.98rem;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
.a-col.ly .v{font-size:.86rem;font-weight:600;color:var(--faint);}
.a-chip{min-width:56px;display:flex;justify-content:flex-end;}

/* ============ OPT B — value + comparison bar ============ */
.b-row{padding:12px 0;border-bottom:1px solid #eef1f6;}
.b-row:last-child{border-bottom:0;}
.b-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
.b-lab{font-size:.72rem;color:var(--muted);font-weight:600;}
.b-val{font-size:1.12rem;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.b-bar{position:relative;height:7px;border-radius:4px;background:#eef1f6;margin-top:9px;}
.b-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;}
.b-fill.pos{background:var(--pos);} .b-fill.neg{background:var(--neg);}
.b-lytick{position:absolute;top:-3px;width:2px;height:13px;background:#6b7891;border-radius:1px;}
.b-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:.62rem;font-weight:600;color:var(--faint);font-variant-numeric:tabular-nums;}
.b-meta .lyv{color:var(--muted);}

/* ============ OPT C — CY big, LY ghost beneath ============ */
.c-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #eef1f6;}
.c-row:last-child{border-bottom:0;}
.c-left .lab{font-size:.72rem;color:var(--muted);font-weight:600;margin-bottom:4px;}
.c-nums{display:flex;align-items:baseline;gap:10px;}
.c-cy{font-size:1.28rem;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.015em;}
.c-ly{font-size:.72rem;color:var(--faint);font-weight:600;font-variant-numeric:tabular-nums;}
.c-ly b{color:var(--muted);font-weight:700;}

/* ============ OPT D — compact comparison table ============ */
.tbl{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:.58rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;text-align:right;padding:11px 16px;background:#fbfcfe;border-bottom:1px solid var(--line-strong);white-space:nowrap;}
.tbl th.l{text-align:left;}
.tbl td{padding:9px 16px;border-bottom:1px solid #eef1f6;font-variant-numeric:tabular-nums;text-align:right;}
.tbl td.l{text-align:left;}
.tbl tr:last-child td{border-bottom:0;}
.tbl tr.grp td{background:#f7f9fc;font-size:.6rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;padding:8px 16px;}
.tbl .m{font-size:.78rem;color:var(--muted);font-weight:600;}
.tbl .cy{font-size:.82rem;color:var(--ink);font-weight:700;}
.tbl .ly{font-size:.78rem;color:var(--faint);font-weight:600;}
.tbl tbody tr:hover td{background:#f5f8fd;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Basket Metrics — current vs last year</h1>
  <p class="sub">Same numbers, four ways to make the <b>CY vs LY</b> read at a glance. Flip between them.</p>

  <div class="switch" id="switch">
    <button data-opt="a" class="active">A · Side-by-side CY / LY</button>
    <button data-opt="b">B · Value + comparison bar</button>
    <button data-opt="c">C · CY big, LY beneath</button>
    <button data-opt="d">D · Compact table</button>
  </div>
  <div class="optnote" id="optnote"></div>

  <div id="stage"></div>
</div>

<script>
"use strict";
/* ---- data straight from the screenshot ---- */
const F = (label,cyN,lyN,fmt,pp)=>({label,cyN,lyN,fmt,pp});
const FAMILIES = [
  { name:'Avg Basket Spend', color:'#2f8a56', metrics:[
    F('Division Avg Basket Spend', 37.21, 36.67, 'm2'),
    F('Avg Basket Spend w/ Selected Items', 191, 188, 'm0'),
    F('Selected Item Value in Basket', 9.18, 9.03, 'm2'),
  ]},
  { name:'Avg Items Per Basket', color:'#2f6bd6', metrics:[
    F('Division Avg Items per Basket', 7.74, 7.82, 'n2'),
    F('Avg Items per Basket w/ Selected Items', 39.69, 40.14, 'n2'),
    F('Selected Item in Basket', 3.22, 3.28, 'n2'),
  ]},
  { name:'Household Trips / Week', color:'#8a5cd6', metrics:[
    F('Division HH Trips per Week', 2.92, 2.96, 'n2'),
    F('Selected Items ASM HH Trips per Week', 0.39, 0.39, 'n2'),
  ]},
  { name:'HH Penetration', color:'#c08a2e', metrics:[
    F('Household Penetration by Selected Items', 52.27, 53.05, 'pct', '-0.78pp'),
  ]},
  { name:'Spend / HH', color:'#c0554f', metrics:[
    F('Division Spend / HH', 1212, 1221, 'm0'),
    F('Selected Items ASM Spend / HH', 111, 110, 'm0'),
  ]},
  { name:'Items / HH', color:'#2f9e8f', metrics:[
    F('Division Items / HH', 252, 260.3, 'auto'),
    F('Selected ASM Items / HH', 39.06, 40.06, 'n2'),
  ]},
];

/* ---- formatting ---- */
function fmt(v,f){
  switch(f){
    case 'm2': return '$'+v.toFixed(2);
    case 'm0': return '$'+Math.round(v).toLocaleString();
    case 'n2': return v.toFixed(2);
    case 'pct':return v.toFixed(2)+'%';
    case 'auto': return (Math.round(v)===v? v.toLocaleString() : v.toFixed(1));
    default: return String(v);
  }
}
const pctOf=(m)=> m.lyN? (m.cyN/m.lyN-1)*100 : 0;
function pctStr(m){ const p=pctOf(m); return (p<0?'−':'+')+Math.abs(p).toFixed(2)+'%'; }
function cls(m){ return pctOf(m)>=0?'pos':'neg'; }
function arrow(m){ return pctOf(m)>=0?'▲':'▼'; }

const $=s=>document.querySelector(s);
const state={opt:'a'};
const NOTES={
  a:'Two labelled columns per metric — This year next to Last year — so the eye compares directly, with the change on the right.',
  b:'One headline number, then a bar: coloured fill = this year, the grey tick = last year’s level. The gap is the change, seen not read.',
  c:'The current value is the hero; last year sits quietly beneath it with the delta. Cleanest when CY is what matters most.',
  d:'A tight spreadsheet: This Yr · Last Yr · Δ in fixed columns. Best for scanning many metrics and spotting the reds fast.',
};

/* ---- OPT A: side-by-side columns ---- */
function optA(){
  return `<div class="grid">${FAMILIES.map(fam=>`
    <div class="card">
      <div class="card-h"><span class="dot" style="background:${fam.color}"></span><span class="t">${fam.name}</span></div>
      <div class="card-b">${fam.metrics.map(m=>`
        <div class="a-row">
          <div class="a-lab">${m.label}</div>
          <div class="a-cmp">
            <div class="a-col"><span class="k">This yr</span><span class="v">${fmt(m.cyN,m.fmt)}</span></div>
            <div class="a-col ly"><span class="k">Last yr</span><span class="v">${fmt(m.lyN,m.fmt)}</span></div>
            <div class="a-chip"><span class="chip ${cls(m)}">${arrow(m)} ${pctStr(m)}</span></div>
          </div>
        </div>`).join('')}</div>
    </div>`).join('')}</div>`;
}

/* ---- OPT B: comparison bar ---- */
function optB(){
  return `<div class="grid">${FAMILIES.map(fam=>`
    <div class="card">
      <div class="card-h"><span class="dot" style="background:${fam.color}"></span><span class="t">${fam.name}</span></div>
      <div class="card-b">${fam.metrics.map(m=>{
        const max=Math.max(m.cyN,m.lyN)||1;
        const cyW=Math.max(4,m.cyN/max*100), lyX=m.lyN/max*100;
        return `<div class="b-row">
          <div class="b-top"><span class="b-lab">${m.label}</span><span class="b-val">${fmt(m.cyN,m.fmt)}</span></div>
          <div class="b-bar"><div class="b-fill ${cls(m)}" style="width:${cyW}%"></div><div class="b-lytick" style="left:calc(${lyX}% - 1px)"></div></div>
          <div class="b-meta"><span class="lyv">LY ${fmt(m.lyN,m.fmt)}</span><span class="pctxt ${cls(m)}">${arrow(m)} ${pctStr(m)}${m.pp?' · '+m.pp:''}</span></div>
        </div>`;
      }).join('')}</div>
    </div>`).join('')}</div>`;
}

/* ---- OPT C: CY big, LY ghost ---- */
function optC(){
  return `<div class="grid">${FAMILIES.map(fam=>`
    <div class="card">
      <div class="card-h"><span class="dot" style="background:${fam.color}"></span><span class="t">${fam.name}</span></div>
      <div class="card-b">${fam.metrics.map(m=>`
        <div class="c-row">
          <div class="c-left">
            <div class="lab">${m.label}</div>
            <div class="c-nums"><span class="c-cy">${fmt(m.cyN,m.fmt)}</span><span class="c-ly"><b>LY</b> ${fmt(m.lyN,m.fmt)}</span></div>
          </div>
          <span class="chip ${cls(m)}">${arrow(m)} ${pctStr(m)}</span>
        </div>`).join('')}</div>
    </div>`).join('')}</div>`;
}

/* ---- OPT D: compact table ---- */
function optD(){
  let rows='';
  FAMILIES.forEach(fam=>{
    rows+=`<tr class="grp"><td class="l" colspan="4"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${fam.color};margin-right:7px;vertical-align:middle"></span>${fam.name}</td></tr>`;
    fam.metrics.forEach(m=>{
      rows+=`<tr>
        <td class="l m">${m.label}</td>
        <td class="cy">${fmt(m.cyN,m.fmt)}</td>
        <td class="ly">${fmt(m.lyN,m.fmt)}</td>
        <td><span class="chip ${cls(m)}">${arrow(m)} ${pctStr(m)}</span></td>
      </tr>`;
    });
  });
  return `<table class="tbl"><thead><tr><th class="l">Metric</th><th>This Yr</th><th>Last Yr</th><th>Δ vs LY</th></tr></thead><tbody>${rows}</tbody></table>`;
}

const RENDER={a:optA,b:optB,c:optC,d:optD};
function render(){
  document.querySelectorAll('#switch button').forEach(b=>b.classList.toggle('active',b.dataset.opt===state.opt));
  $('#optnote').textContent=NOTES[state.opt];
  $('#stage').innerHTML=RENDER[state.opt]();
}
$('#switch').addEventListener('click',e=>{const b=e.target.closest('[data-opt]');if(b){state.opt=b.dataset.opt;render();}});
render();
</script>
</body>
</html>
